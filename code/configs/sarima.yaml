# ============================================================
# SARIMA hyperparameter configuration
# ============================================================

seed: 221

# --- Data (unified with deep learning models) ---
data:
  csv_path: data/historic_demand_2009_2024_noNaN.csv
  date_start: "2019-01-01"
  date_end: "2024-12-31"
  target: tsd
  threshold_date_1: "01-01-2023"
  threshold_date_2: "01-01-2024"

# --- Feature engineering (SARIMA does not use external features) ---
features:
  enabled: false

# --- Model ---
model:
  type: sarima
  seasonal_period: 48
  candidate_specs:
    - order: [0,1,0]
      seasonal_order: [0,1,0]
    - order: [1,1,0]
      seasonal_order: [0,1,0]
    - order: [0,1,1]
      seasonal_order: [0,1,0]
    - order: [1,1,1]
      seasonal_order: [0,1,0]
    - order: [1,1,0]
      seasonal_order: [1,1,0]
    - order: [0,1,1]
      seasonal_order: [1,1,0]
    - order: [1,1,1]
      seasonal_order: [1,1,0]
    - order: [2,1,0]
      seasonal_order: [1,1,0]
    - order: [2,1,1]
      seasonal_order: [1,1,0]
    - order: [1,0,1]
      seasonal_order: [1,1,0]
    - order: [1,0,2]
      seasonal_order: [1,1,0]
    - order: [2,0,1]
      seasonal_order: [1,1,0]

# --- Training (SARIMA hyperparameter selection settings) ---
training:
  selection_window_steps: 5760   # 48 * 120 days
  validation_day_count: 14
