# ============================================================
# CNN 超参数配置
# ============================================================

seed: 221

# --- 数据 ---
data:
  csv_path: data/historic_demand_2009_2024_noNaN.csv
  date_start: "2019-01-01"
  date_end: "2024-12-31"
  target: tsd
  threshold_date_1: "01-01-2023"
  threshold_date_2: "01-01-2024"

# --- 特征工程 ---
features:
  enabled: true
  columns:
    - is_day_off
  cols_to_scale:
    - tsd

# --- 序列与批次 ---
seq_len: 48
batch_size: 144

# --- 模型 ---
model:
  type: cnn
  hidden_dim: 128
  dropout: 0.5

# --- 训练 ---
training:
  num_epochs: 50
  learning_rate: 5.0e-4
  patience: 12
  lr_factor: 0.5
  lr_patience: 5
